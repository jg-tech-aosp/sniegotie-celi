<!DOCTYPE html>
<html lang="lv" data-theme="light">
<head>
  <title>Rēzeknes ielu tīrības karte</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  
  <script src="https://www.paypal.com/sdk/js?client-id=Ac88Ac73001nBi9ELLacJvk0N3hanPsPvwqtF-3xyBdIr7qUPWnWyRi98sINCUBXXpwY8eIQMWL2m1ut&currency=EUR"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

  <style>
    :root {
      --bg-panel: rgba(255, 255, 255, 0.9);
      --text-main: #1c1c1e;
      --accent: #007AFF;
      --border: rgba(0, 0, 0, 0.08);
      --input-bg: rgba(0, 0, 0, 0.04);
      --shadow: 0 8px 32px rgba(0,0,0,0.12);
    }

    [data-theme="dark"] {
      --bg-panel: rgba(28, 28, 30, 0.8);
      --text-main: #ffffff;
      --accent: #0A84FF;
      --border: rgba(255, 255, 255, 0.1);
      --input-bg: rgba(255, 255, 255, 0.08);
      --shadow: 0 12px 40px rgba(0,0,0,0.5);
    }

    body { 
      margin: 0; padding: 0; overflow: hidden; 
      font-family: 'Inter', sans-serif; 
      background: #000;
    }

    #map { height: 100vh; width: 100vw; z-index: 1; }

    /* Theme Toggle */
    .theme-toggle {
      position: absolute; top: 20px; right: 20px;
      z-index: 1000; background: var(--bg-panel);
      border: 1px solid var(--border); border-radius: 14px;
      width: 44px; height: 44px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow); backdrop-filter: blur(12px);
      font-size: 1.2rem; transition: transform 0.2s;
    }

    /* Panel Layout */
    .control-panel {
      position: absolute; 
      z-index: 1000;
      background: var(--bg-panel);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      color: var(--text-main);
      display: flex; flex-direction: column;
      max-height: 85vh; /* Prevents panel from leaving screen */
    }

    @media (min-width: 601px) {
      .control-panel {
        bottom: 30px; left: 30px;
        width: 340px; border-radius: 24px;
        padding: 24px;
      }
    }

    @media (max-width: 600px) {
      .control-panel {
        bottom: 20px; left: 5%; right: 5%;
        width: 90%; border-radius: 28px;
        padding: 20px; box-sizing: border-box;
      }
    }

    h2 { margin: 0 0 16px 0; font-weight: 800; font-size: 1.25rem; letter-spacing: -0.02em; }

    /* Scrollable Sections */
    .panel-content {
      overflow-y: auto;
      padding-right: 4px;
    }

    /* Custom Scrollbar for the panel */
    .panel-content::-webkit-scrollbar { width: 4px; }
    .panel-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    .option-card {
      display: flex; align-items: center; padding: 14px;
      margin: 6px 0; background: var(--input-bg);
      border-radius: 16px; cursor: pointer;
    }

    input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--accent); margin-right: 14px; }

    /* The Fix: Scrollable Payment Area */
    #paypal-button-container {
      margin-top: 12px;
      max-height: 220px; /* Limits the height of the card entry area */
      overflow-y: auto;
      border-radius: 12px;
      padding: 4px;
    }

    .btn-apply {
      margin-top: 18px; width: 100%; padding: 16px;
      background: var(--accent); color: white; border: none;
      border-radius: 16px; cursor: pointer; font-weight: 700; font-size: 1rem;
      flex-shrink: 0; /* Ensures button is always visible */
    }

    .promo-group { display: flex; gap: 8px; margin-top: 12px; }
    .promo-group input {
      flex: 1; background: var(--input-bg); border: 1px solid var(--border);
      padding: 12px; border-radius: 12px; color: var(--text-main); outline: none;
    }

    .disabled-feature { opacity: 0.5; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }
    .btn-reset { font-size: 11px; opacity: 0.4; background: none; border: none; color: var(--text-main); cursor: pointer; text-decoration: underline; margin: 15px auto 0; display: block; }
  </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
<div id="map"></div>

<div class="control-panel" id="panel" style="display:none;">
  <h2>Ielas Statuss</h2>
  
  <div class="panel-content">
    <label class="option-card">
      <input type="checkbox" id="carsCheck">
      <span style="font-weight: 600;">🚗 Netīrs braucējiem</span>
    </label>
    
    <div id="pedSection" class="disabled-feature">
      <label class="option-card">
        <input type="checkbox" id="pedCheck" disabled>
        <span style="font-weight: 600;">🚶 Netīrs gājējiem</span>
      </label>
      
      <div id="pay-notice">
        <div class="promo-group">
          <input type="text" id="promoInput" placeholder="Slepenais kods?">
          <button onclick="checkPromo()" style="padding: 0 16px; border-radius: 12px; border: none; background: var(--text-main); color: var(--bg-panel); font-weight:600; cursor:pointer;">Go</button>
        </div>
        <p style="font-size: 0.75rem; margin: 12px 0; text-align: center; opacity: 0.7;">Piekļuve gājēju datiem: 0.67€</p>
        <div id="paypal-button-container"></div>
      </div>
    </div>
  </div>

  <button onclick="applyStatus()" class="btn-apply">Saglabāt</button>
  <button onclick="relock()" class="btn-reset">Atiestatīt pirkumu</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
// --- CORE CONFIG ---
const firebaseConfig = {
  apiKey: "AIzaSyA0dMTX1y7CYZBLyd4lgQDkR8nJ7utRvIc",
  authDomain: "rezekne-app.firebaseapp.com",
  databaseURL: "https://rezekne-app-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "rezekne-app",
  storageBucket: "rezekne-app.firebasestorage.app",
  messagingSenderId: "364360316305",
  appId: "1:364360316305:web:d75b3b082c0cb8ef819630"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

let isPedestrianUnlocked = localStorage.getItem('pedestrian_unlocked') === 'true';
let currentTheme = localStorage.getItem('theme') || 'light';
let streetStates = {};
let streetLayersById = {};
let selectedLayer = null;

// --- MAP & THEME ---
const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([56.5100, 27.3400], 14);
const tileLayers = {
  light: L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png'),
  dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png')
};

function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  Object.values(tileLayers).forEach(l => map.removeLayer(l));
  tileLayers[theme].addTo(map);
  document.getElementById('themeBtn').innerHTML = theme === 'light' ? '🌙' : '☀️';
  localStorage.setItem('theme', theme);
  currentTheme = theme;
}

function toggleTheme() { setTheme(currentTheme === 'light' ? 'dark' : 'light'); }
setTheme(currentTheme);

// --- APP LOGIC ---
function getColor(state) {
  if (!state) return "#94a3b8";
  if (state.cars && state.ped) return "#ef4444";
  if (state.cars) return "#f59e0b";
  if (state.ped) return "#8b5cf6";
  return "#3b82f6";
}

function unlockPedestrianFeature() {
  isPedestrianUnlocked = true;
  localStorage.setItem('pedestrian_unlocked', 'true');
  document.getElementById("pedCheck").disabled = false;
  document.getElementById("pay-notice").style.display = "none";
  document.getElementById("pedSection").classList.remove("disabled-feature");
}

function checkPromo() {
  if (document.getElementById("promoInput").value === "BURGER67") unlockPedestrianFeature();
}
  else {
    alert("Nepareizs kods!");
  }
}
if (isPedestrianUnlocked) setTimeout(unlockPedestrianFeature, 100);

database.ref('streets').on('value', (snapshot) => {
  streetStates = snapshot.val() || {};
  for (let id in streetLayersById) {
    if (streetStates[id]) streetLayersById[id].setStyle({ color: getColor(streetStates[id]) });
  }
});

async function loadStreets() {
  const query = `[out:json][timeout:25];(way["highway"~"trunk|primary|secondary|tertiary|residential|unclassified|living_street"](56.45,27.25,56.55,27.42););out geom;`;
  try {
    const res = await fetch("https://overpass-api.de/api/interpreter", { method: "POST", body: query });
    const data = await res.json();
    L.geoJSON(data.elements.map(el => ({
      type: "Feature",
      geometry: { type: "LineString", coordinates: el.geometry.map(g => [g.lon, g.lat]) },
      properties: { id: el.id }
    })), {
      style: f => ({ color: getColor(streetStates[f.properties.id]), weight: 6, opacity: 0.8, lineCap: 'round' }),
      onEachFeature: (f, layer) => {
        const id = f.properties.id;
        streetLayersById[id] = layer;
        layer.on("click", () => {
          if(selectedLayer) selectedLayer.setStyle({ weight: 6, opacity: 0.8 });
          selectedLayer = layer;
          layer.setStyle({ weight: 10, opacity: 1 });
          const state = streetStates[id] || { cars:false, ped:false };
          document.getElementById("carsCheck").checked = state.cars;
          if (isPedestrianUnlocked) document.getElementById("pedCheck").checked = state.ped;
          document.getElementById("panel").style.display = "block";
        });
      }
    }).addTo(map);
  } catch (e) { console.error(e); }
}

function applyStatus() {
  if (!selectedLayer) return;
  const id = selectedLayer.feature.properties.id;
  database.ref('streets/' + id).set({
    cars: document.getElementById("carsCheck").checked,
    ped: isPedestrianUnlocked ? document.getElementById("pedCheck").checked : (streetStates[id]?.ped || false)
  });
  document.getElementById("panel").style.display = "none";
  selectedLayer.setStyle({ weight: 6, opacity: 0.8 });
}

function relock() { localStorage.clear(); location.reload(); }

paypal.Buttons({
  createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: '0.67', currency_code: 'EUR' } }] }),
  onApprove: (data, actions) => actions.order.capture().then(unlockPedestrianFeature)
}).render('#paypal-button-container');

loadStreets();
</script>
</body>
</html>
