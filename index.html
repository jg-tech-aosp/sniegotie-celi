<!DOCTYPE html>
<html lang="lv" data-theme="light">
<head>
  <title>Rēzeknes ielu tīrības karte</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  
  <script src="https://www.paypal.com/sdk/js?client-id=Ac88Ac73001nBi9ELLacJvk0N3hanPsPvwqtF-3xyBdIr7qUPWnWyRi98sINCUBXXpwY8eIQMWL2m1ut&currency=EUR"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

  <style>
    :root {
      --bg-panel: rgba(255, 255, 255, 0.9);
      --text-main: #1c1c1e;
      --accent: #007AFF;
      --border: rgba(0, 0, 0, 0.08);
      --input-bg: rgba(0, 0, 0, 0.04);
      --shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    [data-theme="dark"] {
      --bg-panel: rgba(28, 28, 30, 0.8);
      --text-main: #ffffff;
      --accent: #0A84FF;
      --border: rgba(255, 255, 255, 0.1);
      --input-bg: rgba(255, 255, 255, 0.08);
      --shadow: 0 12px 40px rgba(0,0,0,0.5);
    }

    body { margin: 0; padding: 0; overflow: hidden; font-family: 'Inter', sans-serif; background: #000; }
    #map { height: 100vh; width: 100vw; z-index: 1; }

    /* UI Components */
    .auth-nav { position: absolute; top: 20px; left: 20px; z-index: 1000; display: flex; gap: 10px; }
    .auth-btn { background: var(--bg-panel); color: var(--text-main); border: 1px solid var(--border); padding: 10px 16px; border-radius: 12px; cursor: pointer; font-weight: 600; backdrop-filter: blur(10px); box-shadow: var(--shadow); transition: 0.2s; }
    
    #user-tag:not([disabled]) { border-color: var(--accent); cursor: pointer; }
    #user-tag:not([disabled]):hover { background: var(--input-bg); }

    .theme-toggle { position: absolute; top: 20px; right: 20px; z-index: 1000; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 14px; width: 44px; height: 44px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); font-size: 1.2rem; }

    /* Search & Location Controls */
    .map-controls { position: absolute; top: 80px; left: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
    .search-box { position: relative; width: 250px; }
    #streetSearch { width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-panel); color: var(--text-main); backdrop-filter: blur(10px); box-shadow: var(--shadow); box-sizing: border-box; }
    .search-results { position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-panel); border-radius: 12px; margin-top: 5px; max-height: 200px; overflow-y: auto; display: none; box-shadow: var(--shadow); z-index: 1001; }
    .search-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 0.9rem; color: var(--text-main); }
    .search-item:hover { background: var(--input-bg); }
    .control-btn { width: 44px; height: 44px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; backdrop-filter: blur(10px); }

    /* Modals */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    .modal-card { background: var(--bg-panel); padding: 30px; border-radius: 24px; color: var(--text-main); border: 1px solid var(--border); box-shadow: var(--shadow); width: 320px; }
    .modal-card input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text-main); box-sizing: border-box; }
    .label-hint { font-size: 0.75rem; opacity: 0.6; margin-top: 10px; display: block; }

    /* Google Button Styling */
    .google-btn { background: #fff; color: #757575; border: 1px solid #ddd; padding: 10px; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .google-btn:hover { background: #f1f1f1; }

    /* Admin Dashboard */
    .admin-card { width: 90%; max-width: 600px; max-height: 80vh; overflow: hidden; display: flex; flex-direction: column; }
    .user-list { overflow-y: auto; flex: 1; margin-top: 15px; }
    .user-row { background: var(--input-bg); padding: 15px; border-radius: 16px; margin-bottom: 10px; border: 1px solid var(--border); }
    .btn-small { padding: 6px 12px; border-radius: 8px; border: none; font-size: 0.75rem; cursor: pointer; font-weight: 700; transition: 0.2s; }

    /* Control Panel */
    .control-panel {
      position: absolute;
      z-index: 1000;
      background: var(--bg-panel);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      /* FIX: constrain height so panel never grows beyond viewport */
      max-height: min(85vh, 520px);
    }
    @media (min-width: 601px) {
      .control-panel { bottom: 30px; left: 30px; width: 340px; border-radius: 24px; padding: 24px; }
    }
    @media (max-width: 600px) {
      .control-panel { bottom: 20px; left: 5%; right: 5%; width: 90%; border-radius: 28px; padding: 20px; box-sizing: border-box; }
    }

    /* FIX: make the scrollable content area inside the panel */
    .panel-content {
      overflow-y: auto;
      flex: 1;
      /* Custom scrollbar */
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .panel-content::-webkit-scrollbar { width: 4px; }
    .panel-content::-webkit-scrollbar-track { background: transparent; }
    .panel-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .option-card { display: flex; align-items: center; padding: 14px; margin: 6px 0; background: var(--input-bg); border-radius: 16px; }
    .btn-apply { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 16px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 10px; /* FIX: don't shrink the save button */ flex-shrink: 0; }
    .btn-danger { background: none; border: none; color: #FF3B30; cursor: pointer; font-size: 0.8rem; text-decoration: underline; width: 100%; margin-top: 20px; }

    /* FIX: constrain PayPal container so it doesn't blow up the panel */
    #paypal-button-container {
      max-height: 200px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* FIX: PayPal iframes inside the container should not overflow */
    #paypal-button-container iframe {
      max-width: 100% !important;
    }

    /* --- BLOG / FEED --- */
    .feed-fab {
      position: absolute;
      bottom: 30px;
      right: 30px;
      z-index: 1000;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,122,255,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .feed-fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(0,122,255,0.5); }

    .feed-panel {
      position: absolute;
      bottom: 96px;
      right: 30px;
      z-index: 1000;
      width: 320px;
      max-height: 70vh;
      background: var(--bg-panel);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: 24px;
      display: none;
      flex-direction: column;
      overflow: hidden;
      color: var(--text-main);
    }
    @media (max-width: 600px) {
      .feed-panel { right: 5%; left: 5%; width: 90%; bottom: 90px; }
      .feed-fab { right: 20px; bottom: 20px; }
    }

    .feed-header {
      padding: 18px 20px 12px;
      font-weight: 800;
      font-size: 1rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .feed-compose {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: none;
      flex-direction: column;
      gap: 8px;
    }
    .feed-compose textarea {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text-main);
      padding: 10px 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      resize: none;
      box-sizing: border-box;
      outline: none;
    }
    .feed-compose-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .feed-photo-label {
      cursor: pointer;
      font-size: 1.2rem;
      padding: 6px 10px;
      border-radius: 10px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      transition: 0.15s;
    }
    .feed-photo-label:hover { background: var(--border); }
    .feed-photo-preview {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 8px;
      display: none;
    }
    .feed-post-btn {
      margin-left: auto;
      background: var(--accent);
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .feed-list {
      overflow-y: auto;
      flex: 1;
      padding: 10px 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .feed-list::-webkit-scrollbar { width: 4px; }
    .feed-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .feed-item {
      padding: 12px;
      border-radius: 16px;
      background: var(--input-bg);
      margin-bottom: 10px;
      border: 1px solid var(--border);
    }
    .feed-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .feed-item-user { font-weight: 700; font-size: 0.85rem; cursor: pointer; }
    .feed-item-user:hover { text-decoration: underline; }
    .feed-item-time { font-size: 0.72rem; opacity: 0.5; }
    .feed-item-text { font-size: 0.88rem; line-height: 1.4; word-break: break-word; }
    .feed-item-img {
      margin-top: 8px;
      width: 100%;
      border-radius: 10px;
      object-fit: cover;
      max-height: 180px;
      display: block;
    }
    .feed-item-delete {
      background: none;
      border: none;
      color: #FF3B30;
      font-size: 0.72rem;
      cursor: pointer;
      padding: 0;
      margin-top: 6px;
      text-decoration: underline;
    }
    .feed-empty {
      text-align: center;
      opacity: 0.4;
      font-size: 0.85rem;
      padding: 30px 0;
    }

    /* Likes & Comments */
    .feed-item-actions {
      display: flex;
      gap: 12px;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      align-items: center;
    }
    .action-btn {
      background: none;
      border: none;
      color: var(--text-main);
      font-size: 0.8rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0.6;
      transition: 0.15s;
    }
    .action-btn:hover { background: var(--input-bg); opacity: 1; }
    .action-btn.liked { color: #FF3B30; opacity: 1; }

    .comments-section {
      display: none;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .comment-item {
      padding: 6px 0;
      font-size: 0.82rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .comment-item:last-child { border-bottom: none; }
    .comment-author { font-weight: 700; cursor: pointer; }
    .comment-author:hover { text-decoration: underline; }
    .comment-text { opacity: 0.85; margin-top: 2px; word-break: break-word; }
    .comment-meta { font-size: 0.7rem; opacity: 0.4; white-space: nowrap; }
    .comment-compose {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .comment-compose input {
      flex: 1;
      padding: 7px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text-main);
      font-size: 0.82rem;
      font-family: 'Inter', sans-serif;
      outline: none;
    }
    .comment-send-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 7px 12px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.8rem;
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 95vw;
      max-height: 95vh;
      border-radius: 12px;
      object-fit: contain;
    }
  </style>
</head>
<body>

<div class="auth-nav">
  <div id="logged-out-ui">
    <button class="auth-btn" onclick="openAuth('login')">Pieteikties</button>
    <button class="auth-btn" onclick="openAuth('register')">Reģistrēties</button>
  </div>
  <div id="logged-in-ui" style="display:none;">
    <button class="auth-btn" id="user-tag" onclick="openSettings()">Ielādē...</button>
    <button class="auth-btn" onclick="handleLogout()">Iziet</button>
    <button class="auth-btn" id="admin-panel-btn" style="display:none; background:#FF3B30; color:white;" onclick="openAdminDashboard()">Admin ⚙️</button>
  </div>
</div>

<div class="map-controls">
  <div class="search-box">
    <input type="text" id="streetSearch" placeholder="Meklēt ielu Rēzeknē..." oninput="handleSearch()">
    <div id="search-results" class="search-results"></div>
  </div>
  <button class="control-btn" onclick="findMyLocation()" title="Mana atrašanās vieta">📍</button>
  <button class="control-btn" id="reload-streets-btn" onclick="retryLoadStreets()" title="Pārlādēt ielas">🔃</button>
</div>

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
<div id="map"></div>

<div class="modal-overlay" id="auth-modal">
  <div class="modal-card">
    <h2 id="modal-title">Pieteikties</h2>
    <input type="email" id="email" placeholder="E-pasts">
    <input type="password" id="password" placeholder="Parole">
    <div id="reg-fields" style="display:none;">
      <input type="text" id="username" placeholder="Lietotājvārds">
      <input type="date" id="dob" title="Dzimšanas datums">
    </div>
    <button class="btn-apply" onclick="submitAuth()">Apstiprināt</button>
    
    <button class="google-btn" onclick="signInWithGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18"> 
      Turpināt ar Google
    </button>

    <button onclick="closeAuth()" style="margin-top:10px; width:100%; background:none; border:none; color:var(--text-main); opacity:0.5; cursor:pointer;">Atcelt</button>
  </div>
</div>

<div class="modal-overlay" id="settings-modal">
  <div class="modal-card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2 style="margin:0;">Iestatījumi</h2>
      <button onclick="closeSettings()" class="btn-small">X</button>
    </div>
    <span class="label-hint">Lietotājvārds</span>
    <input type="text" id="settings-username">
    <span class="label-hint">Dzimšanas datums</span>
    <input type="date" id="settings-dob">
    <span class="label-hint">Bio</span>
    <textarea id="settings-bio" rows="3" style="width:100%; padding:12px; border-radius:12px; border:1px solid var(--border); background:var(--input-bg); color:var(--text-main); font-family:'Inter',sans-serif; font-size:0.9rem; resize:none; box-sizing:border-box;" placeholder="Pastāsti par sevi..."></textarea>
    <div id="settings-stats" style="margin:15px 0; padding:12px; background:var(--input-bg); border-radius:12px; font-size:0.9rem;">
      Statuss: <span id="settings-premium-badge">Parasts</span>
    </div>
    <button class="btn-apply" onclick="updateUserSettings()">Saglabāt izmaiņas</button>
    <button class="btn-danger" onclick="deleteOwnAccount()">Dzēst manu kontu</button>
  </div>
</div>

<!-- Profile Modal -->
<div class="modal-overlay" id="profile-modal">
  <div class="modal-card" style="max-height:80vh; display:flex; flex-direction:column; overflow:hidden;">
    <div style="display:flex; justify-content:space-between; align-items:center; flex-shrink:0;">
      <h2 style="margin:0;" id="profile-username">Profils</h2>
      <button onclick="closeProfile()" class="btn-small">X</button>
    </div>
    <div id="profile-badge" style="margin:8px 0; font-size:0.85rem;"></div>
    <div id="profile-bio" style="font-size:0.85rem; opacity:0.7; margin-bottom:12px; padding:10px; background:var(--input-bg); border-radius:12px; flex-shrink:0;"></div>
    <div style="font-weight:700; font-size:0.8rem; opacity:0.5; margin-bottom:8px; flex-shrink:0;">ZIŅAS</div>
    <div id="profile-posts" style="overflow-y:auto; flex:1; scrollbar-width:thin;"></div>
  </div>
</div>

<div id="admin-dashboard" class="modal-overlay">
  <div class="modal-card admin-card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2 style="margin:0;">Lietotāju Kontrole</h2>
      <button onclick="closeAdminDashboard()" class="auth-btn">X</button>
    </div>

    <!-- Pinned Announcement -->
    <div style="margin-top:15px; padding:12px; background:var(--input-bg); border-radius:14px; border:1px solid var(--border);">
      <div style="font-weight:700; font-size:0.8rem; margin-bottom:8px;">📌 Piesprausts paziņojums</div>
      <textarea id="pin-text" rows="2" placeholder="Raksti paziņojumu..." style="width:100%; padding:8px 10px; border-radius:10px; border:1px solid var(--border); background:var(--bg-panel); color:var(--text-main); font-family:'Inter',sans-serif; font-size:0.85rem; resize:none; box-sizing:border-box;"></textarea>
      <div style="display:flex; gap:8px; margin-top:8px;">
        <button class="btn-apply" style="margin-top:0; padding:10px;" onclick="pinAnnouncement()">Piespraust</button>
        <button class="btn-apply" style="margin-top:0; padding:10px; background:#FF3B30;" onclick="unpinAnnouncement()">Noņemt</button>
      </div>
    </div>

    <input type="text" id="adminSearch" placeholder="Meklēt lietotāju..." oninput="renderUserList()" style="margin-top:15px;">
    <div id="user-list" class="user-list"></div>
    <div style="margin-top:20px; border-top: 1px solid var(--border); padding-top:15px;">
      <button onclick="resetMap()" style="background:#FF3B30;" class="btn-apply">Atiestatīt visu karti</button>
    </div>
  </div>
</div>

<div class="control-panel" id="panel" style="display:none;">
  <h2 style="margin: 0 0 10px 0; flex-shrink: 0;">Ielas Statuss</h2>
  <div class="panel-content">
    <label class="option-card"><input type="checkbox" id="carsCheck"> <span style="margin-left:10px;">🚗 Netīrs braucējiem</span></label>
    <div id="pedSection" style="opacity:0.5; border-top:1px solid var(--border); margin-top:15px; padding-top:15px;">
      <label class="option-card"><input type="checkbox" id="pedCheck" disabled> <span style="margin-left:10px;">🚶 Netīrs gājējiem</span></label>
      <div id="pay-notice">
        <p style="font-size: 0.75rem; text-align: center;">Premium funkcija: 0.67€</p>
        <div id="paypal-button-container"></div>
      </div>
    </div>
  </div>
  <button onclick="applyStatus()" class="btn-apply">Saglabāt</button>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="foto">
</div>

<!-- Feed FAB -->
<button class="feed-fab" onclick="toggleFeed()" title="Kopienas ziņas">💬</button>

<!-- Feed Panel -->
<div class="feed-panel" id="feed-panel">
  <div class="feed-header">
    <span>💬 Kopienas ziņas</span>
    <div style="display:flex;gap:8px;align-items:center;">
      <button onclick="refreshFeed()" title="Atjaunot" style="background:none;border:none;color:var(--text-main);font-size:1rem;cursor:pointer;opacity:0.5;">🔄</button>
      <button onclick="toggleFeed()" style="background:none;border:none;color:var(--text-main);font-size:1rem;cursor:pointer;opacity:0.5;">✕</button>
    </div>
  </div>
  <div class="feed-compose" id="feed-compose">
    <textarea id="feed-text" rows="3" placeholder="Kas jauns Rēzeknē?"></textarea>
    <div class="feed-compose-actions">
      <label class="feed-photo-label" title="Pievienot foto">
        📷
        <input type="file" id="feed-photo-input" accept="image/*" style="display:none;" onchange="handlePhotoSelect(event)">
      </label>
      <img id="feed-photo-preview" class="feed-photo-preview" alt="preview">
      <button class="feed-post-btn" onclick="submitPost()">Publicēt</button>
    </div>
  </div>
  <div id="pinned-announcement" style="display:none; flex-shrink:0; margin:0 12px 10px; padding:12px; background:rgba(0,122,255,0.1); border:1px solid var(--accent); border-radius:14px; font-size:0.85rem;">
    <div style="font-weight:700; margin-bottom:4px;">📌 Paziņojums</div>
    <div id="pinned-text"></div>
  </div>
  <div class="feed-list" id="feed-list">

// --- MAP & SEARCH ---
const map = L.map('map', { zoomControl: false, attributionControl: false, minZoom: 10 }).setView([56.5100, 27.3400], 14);
const tileLayers = {
  light: L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png'),
  dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png')
};
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  Object.values(tileLayers).forEach(l => map.removeLayer(l));
  tileLayers[theme].addTo(map);
  document.getElementById('themeBtn').innerHTML = theme === 'light' ? '🌙' : '☀️';
  localStorage.setItem('theme', theme);
  currentTheme = theme;
}
setTheme(currentTheme);

function getColor(state) {
  if (!state) return "#94a3b8";
  if (state.cars && state.ped) return "#ef4444";
  if (state.cars) return "#f59e0b";
  if (state.ped) return "#8b5cf6";
  return "#3b82f6";
}

database.ref('streets').on('value', (snapshot) => {
  streetStates = snapshot.val() || {};
  for (let id in streetLayersById) {
    if (streetStates[id]) streetLayersById[id].setStyle({ color: getColor(streetStates[id]) });
  }
});

async function retryLoadStreets() {
  const btn = document.getElementById('reload-streets-btn');
  btn.innerText = '⏳';
  btn.style.pointerEvents = 'none';
  // Clear existing layers
  for (let id in streetLayersById) {
    map.removeLayer(streetLayersById[id]);
  }
  streetLayersById = {};
  selectedLayer = null;
  await loadStreets();
  btn.innerText = '🔃';
  btn.style.pointerEvents = 'auto';
}

async function loadStreets() {
  const query = `[out:json][timeout:25];(way["highway"~"trunk|primary|secondary|tertiary|residential|unclassified|living_street"](56.45,27.25,56.55,27.42););out geom;`;
  try {
    const res = await fetch("https://overpass-api.de/api/interpreter", { method: "POST", body: query });
    const data = await res.json();
    allStreetData = data.elements.filter(el => el.tags && el.tags.name);
    
    L.geoJSON(data.elements.map(el => ({
      type: "Feature", geometry: { type: "LineString", coordinates: el.geometry.map(g => [g.lon, g.lat]) },
      properties: { id: el.id, name: el.tags?.name || "Nezināma iela" }
    })), {
      style: f => ({ color: getColor(streetStates[f.properties.id]), weight: 6, opacity: 0.8, lineCap: 'round' }),
      onEachFeature: (f, layer) => {
        const id = f.properties.id;
        streetLayersById[id] = layer;
        layer.on("click", () => {
          if(selectedLayer) selectedLayer.setStyle({ weight: 6, opacity: 0.8 });
          selectedLayer = layer;
          layer.setStyle({ weight: 10, opacity: 1 });
          const state = streetStates[id] || { cars:false, ped:false };
          document.getElementById("carsCheck").checked = state.cars;
          if (isPedestrianUnlocked) document.getElementById("pedCheck").checked = state.ped;
          document.getElementById("panel").style.display = "flex";
        });
      }
    }).addTo(map);
  } catch (e) { console.error(e); }
}

function handleSearch() {
  const query = document.getElementById('streetSearch').value.toLowerCase();
  const resDiv = document.getElementById('search-results');
  if (query.length < 2) { resDiv.style.display = 'none'; return; }
  const matches = allStreetData.filter(s => s.tags.name.toLowerCase().includes(query)).slice(0, 5);
  if (matches.length > 0) {
    resDiv.innerHTML = matches.map(m => `<div class="search-item" onclick="focusStreet('${m.id}')">${m.tags.name}</div>`).join('');
    resDiv.style.display = 'block';
  } else { resDiv.style.display = 'none'; }
}

function focusStreet(id) {
  const layer = streetLayersById[id];
  if (layer) {
    map.fitBounds(layer.getBounds(), { maxZoom: 18 });
    layer.fire('click');
    document.getElementById('search-results').style.display = 'none';
    document.getElementById('streetSearch').value = "";
  }
}

function findMyLocation() {
  if (!navigator.geolocation) return alert("Nav pieejams.");
  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude, lng = pos.coords.longitude;
    map.setView([lat, lng], 17);
    L.circle([lat, lng], { radius: 10, color: '#007AFF' }).addTo(map).bindPopup("Tu esi šeit").openPopup();
  }, () => alert("Atļauja liegta."));
}

function applyStatus() {
  if (!auth.currentUser) {
    if (guestEdits >= 2) { alert("Piesakieties!"); return openAuth('login'); }
    guestEdits++; localStorage.setItem('guest_edits', guestEdits);
  }
  if (userProfile?.bannedDraw) {
    alert("⛔ Jums ir aizliegts atzīmēt ielas.");
    return;
  }
  const id = selectedLayer.feature.properties.id;
  database.ref('streets/' + id).set({
    cars: document.getElementById("carsCheck").checked,
    ped: isPedestrianUnlocked ? document.getElementById("pedCheck").checked : (streetStates[id]?.ped || false)
  });
  document.getElementById("panel").style.display = "none";
}

function unlockPedestrianFeature() {
  isPedestrianUnlocked = true;

  document.getElementById("pay-notice").style.display = "none";

function openAuth(m) { document.getElementById('auth-modal').style.display='flex'; document.getElementById('modal-title').innerText=m==='login'?'Pieteikties':'Reģistrēties'; document.getElementById('reg-fields').style.display=m==='login'?'none':'block'; }

  const isReg = document.getElementById('reg-fields').style.display === 'block';

function closeAuth() { document.getElementById('auth-modal').style.display='none'; }
function closeAdminDashboard() { document.getElementById('admin-dashboard').style.display='none'; }
function toggleTheme() { setTheme(currentTheme === 'light' ? 'dark' : 'light'); }

// --- BLOG FEED ---
let feedPhotoBase64 = null;
let isFeedOpen = false;

function toggleFeed() {
  isFeedOpen = !isFeedOpen;
  const panel = document.getElementById('feed-panel');
  panel.style.display = isFeedOpen ? 'flex' : 'none';
  if (isFeedOpen) updateComposeVisibility();
}

function updateComposeVisibility() {
  document.getElementById('feed-compose').style.display = auth.currentUser ? 'flex' : 'none';
}

function handlePhotoSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  // Resize/compress before storing as base64
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 800;
      let w = img.width, h = img.height;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      feedPhotoBase64 = canvas.toDataURL('image/jpeg', 0.7);
      const preview = document.getElementById('feed-photo-preview');
      preview.src = feedPhotoBase64;
      preview.style.display = 'block';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function submitPost() {
  const text = document.getElementById('feed-text').value.trim();
  if (!text && !feedPhotoBase64) return;
  if (!auth.currentUser) return;
  if (userProfile?.bannedPost) {
    alert("⛔ Jums ir aizliegts publicēt ziņas.");
    return;
  }

  const post = {
    uid: auth.currentUser.uid,
    username: userProfile?.username || auth.currentUser.displayName || 'Lietotājs',
    text: text,
    photo: feedPhotoBase64 || null,
    timestamp: Date.now()
  };

  await database.ref('feed').push(post);

  // Reset compose
  document.getElementById('feed-text').value = '';
  document.getElementById('feed-photo-preview').style.display = 'none';
  document.getElementById('feed-photo-input').value = '';
  feedPhotoBase64 = null;
}

function timeAgo(ts) {
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60) return 'tikko';
  if (diff < 3600) return Math.floor(diff/60) + ' min. atpakaļ';
  if (diff < 86400) return Math.floor(diff/3600) + ' st. atpakaļ';
  return Math.floor(diff/86400) + ' d. atpakaļ';
}

async function deletePost(key) {
  if (confirm('Dzēst ziņu?')) {
    await database.ref('feed/' + key).remove();
  }
}

// --- LIKES & COMMENTS ---
async function toggleLike(postId, btnEl) {
  if (!auth.currentUser) return openAuth('login');
  const uid = auth.currentUser.uid;
  const likeRef = database.ref(`feed/${postId}/likes/${uid}`);
  const snap = await likeRef.once('value');
  if (snap.exists()) {
    await likeRef.remove();
  } else {
    await likeRef.set(true);
  }
}

function toggleComments(postId) {
  const section = document.getElementById(`comments-${postId}`);
  if (!section) return;
  const isOpen = section.style.display === 'block';
  section.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) loadComments(postId);
}

function loadComments(postId) {
  const container = document.getElementById(`comment-list-${postId}`);
  if (!container) return;
  database.ref(`feed/${postId}/comments`).orderByChild('timestamp').on('value', (snap) => {
    container.innerHTML = '';
    const val = snap.val();
    if (!val) { container.innerHTML = '<div style="opacity:0.4;font-size:0.8rem;padding:4px 0;">Nav komentāru.</div>'; return; }
    Object.entries(val).forEach(([cid, c]) => {
      const canDelete = auth.currentUser && (auth.currentUser.uid === c.uid || userProfile?.role === 'admin');
      const div = document.createElement('div');
      div.className = 'comment-item';
      div.innerHTML = `
        <div style="flex:1;">
          <span class="comment-author" onclick="openProfile('${c.uid}','${c.username}')">${c.username}</span>
          <span class="comment-meta"> · ${timeAgo(c.timestamp)}</span>
          <div class="comment-text">${c.text}</div>
        </div>
        ${canDelete ? `<button class="feed-item-delete" onclick="deleteComment('${postId}','${cid}')">✕</button>` : ''}
      `;
      container.appendChild(div);
    });
  });
}

async function submitComment(postId) {
  if (!auth.currentUser) return openAuth('login');
  if (userProfile?.bannedPost) {
    alert("⛔ Jums ir aizliegts publicēt ziņas.");
    return;
  }
  const input = document.getElementById(`comment-input-${postId}`);
  const text = input.value.trim();
  if (!text) return;
  await database.ref(`feed/${postId}/comments`).push({
    uid: auth.currentUser.uid,
    username: userProfile?.username || auth.currentUser.displayName || 'Lietotājs',
    text,
    timestamp: Date.now()
  });
  input.value = '';
}

async function deleteComment(postId, cid) {
  if (confirm('Dzēst komentāru?')) await database.ref(`feed/${postId}/comments/${cid}`).remove();
}

function buildPostHTML(key, post, isOwner) {
  const likes = post.likes ? Object.keys(post.likes).length : 0;
  const comments = post.comments ? Object.keys(post.comments).length : 0;
  const isLiked = auth.currentUser && post.likes && post.likes[auth.currentUser.uid];
  return `
    <div class="feed-item-header">
      <span class="feed-item-user" onclick="openProfile('${post.uid}', '${post.username}')">${post.username}</span>
      <span class="feed-item-time">${timeAgo(post.timestamp)}</span>
    </div>
    ${post.text ? `<div class="feed-item-text">${post.text}</div>` : ''}
    ${post.photo ? `<img class="feed-item-img" src="${post.photo}" alt="foto" onclick="openLightbox(this.src)" style="cursor:zoom-in;">` : ''}
    <div class="feed-item-actions">
      <button class="action-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike('${key}', this)">
        ❤️ <span>${likes}</span>
      </button>
      <button class="action-btn" onclick="toggleComments('${key}')">
        💬 <span>${comments}</span>
      </button>
      ${isOwner ? `<button class="feed-item-delete" style="margin-left:auto;" onclick="deletePost('${key}')">Dzēst</button>` : ''}
    </div>
    <div class="comments-section" id="comments-${key}">
      <div id="comment-list-${key}"></div>
      ${auth.currentUser ? `
        <div class="comment-compose">
          <input type="text" id="comment-input-${key}" placeholder="Raksti komentāru..." onkeydown="if(event.key==='Enter') submitComment('${key}')">
          <button class="comment-send-btn" onclick="submitComment('${key}')">→</button>
        </div>` : '<div style="opacity:0.4;font-size:0.8rem;margin-top:6px;">Piesakieties, lai komentētu.</div>'}
    </div>
  `;
}

async function openProfile(uid, username) {
  document.getElementById('profile-modal').style.display = 'flex';
  document.getElementById('profile-username').innerText = username;
  document.getElementById('profile-badge').innerText = '';
  document.getElementById('profile-bio').innerText = '';
  document.getElementById('profile-posts').innerHTML = '<div style="opacity:0.4;font-size:0.85rem;padding:10px;">Ielādē...</div>';

  // Load user data
  const snap = await database.ref('users/' + uid).once('value');
  const u = snap.val();
  if (u) {
    document.getElementById('profile-badge').innerHTML = u.isPremium ? '✨ <strong>Premium</strong>' : '👤 Bezmaksas';
    document.getElementById('profile-bio').innerText = u.bio || 'Nav bio.';
  }

  // Load their posts
  const feedSnap = await database.ref('feed').orderByChild('uid').equalTo(uid).once('value');
  const postsContainer = document.getElementById('profile-posts');
  postsContainer.innerHTML = '';
  const val = feedSnap.val();
  if (!val) {
    postsContainer.innerHTML = '<div style="opacity:0.4;font-size:0.85rem;padding:10px;">Nav ziņu.</div>';
    return;
  }
  const posts = Object.entries(val).reverse();
  posts.forEach(([key, post]) => {
    const item = document.createElement('div');
    item.className = 'feed-item';
    const canDelete = auth.currentUser && (auth.currentUser.uid === uid || userProfile?.role === 'admin');
    item.innerHTML = buildPostHTML(key, post, canDelete);
    postsContainer.appendChild(item);
  });
}
function closeProfile() { document.getElementById('profile-modal').style.display = 'none'; }

function refreshFeed() {

      item.className = 'feed-item';
      const isOwner = auth.currentUser && (auth.currentUser.uid === post.uid || userProfile?.role === 'admin');
      item.innerHTML = buildPostHTML(key, post, isOwner);
      list.appendChild(item);
    });
  });
}
